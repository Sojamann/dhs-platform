# Generated by Ansible - do not edit manually
services:
  db:
    container_name: &pgcontainer {{ compose_db_container_name }}
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: &pguser {{ db_username }}
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
      POSTGRES_DB: &pgdb {{ db_name }}
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - db
    secrets:
      - source: db-password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 5s # TODO: 30s
      timeout: 10s
      retries: 5
      # special startup duration that the container has until
      # being not ready is counted as failure
      start_period: 5s

  frontend:
    container_name: frontend
    image: ghcr.io/ff-sued/dhs-frontend:{{ version }}
    restart: always
    networks:
      - app-network

  backend:
    container_name: backend
    image: ghcr.io/ff-sued/dhs-backend:{{ version }}
    restart: always
    depends_on:
      db:
        condition: service_healthy
        restart: true
    networks:
      - app-network
      - db
    secrets:
      # all secrets are placed in /var/secrets/<name> (e.g. /var/secrets/db-password)
      - source: db-password
      - source: jwt-public-key
      - source: jwt-private-key
    environment:
      DOMAIN: {{ domain }}
      DB_HOST: *pgcontainer
      DB_PORT: 5432
      DB_DB: *pgdb
      DB_USER: *pguser

  caddy:
    build:
      dockerfile_inline: |
        FROM caddy:2
        COPY <<EOF /etc/caddy/Caddyfile
        {{ domain }} {
          reverse_proxy /api/* backend:8080
          reverse_proxy /auth/* backend:8080
          reverse_proxy /* frontend:3000
        }
        EOF
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

secrets:
  db-password:
    file: ./secrets/dbpass
  jwt-private-key:
    file: ./secrets/jwt
  jwt-public-key:
    file: ./secrets/jwt.pub
networks:
  app-network:
  db:
volumes:
  caddy_data:
  caddy_config:
  db:
