[env]
HCLOUD_TOKEN = {required = true}
# NOTE: this activates as soon as the venv exists
_.source = ".venv/bin/activate"

[tools]
terraform = "1"
terraform-ls = "latest"
# NOTE: ansible is installed through the requirements.txt file since the
#       mise install of ansible does not play well together with the venv

[tasks.init]
run = '''
  uv venv --allow-existing
  uv pip install -r requirements.txt
  source .venv/bin/activate
  ansible-galaxy collection install -r ansible/collections/requirements.yaml
'''

[tasks.terraform]
description = "Run Terraform Command"
dir = "terraform"
run = "terraform"

[tasks.ansible]
description = "Run Ansible-Playbook Command"
env = { ANSIBLE_CONFIG = "ansible/ansible.cfg" }
run = "ansible-playbook"
